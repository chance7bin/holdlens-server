server:
  port: 8091

# 线程池配置
thread:
  pool:
    executor:
      config:
        core-pool-size: 20
        max-pool-size: 50
        keep-alive-time: 5000
        block-queue-size: 5000
        policy: CallerRunsPolicy

# 数据库配置；启动时配置数据库资源信息
spring:
  datasource:
    username: root
    password: F8wCPemlgWdEa6up
    url: jdbc:mysql://127.0.0.1:13306/holdlens?useUnicode=true&characterEncoding=utf8&autoReconnect=true&zeroDateTimeBehavior=convertToNull&serverTimezone=Asia/Shanghai&useSSL=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      pool-name: Retail_HikariCP
      minimum-idle: 15 #最小空闲连接数量
      idle-timeout: 180000 #空闲连接存活最大时间，默认600000（10分钟）
      maximum-pool-size: 25 #连接池最大连接数，默认是10
      auto-commit: true  #此属性控制从池返回的连接的默认自动提交行为,默认值：true
      max-lifetime: 1800000 #此属性控制池中连接的最长生命周期，值0表示无限生命周期，默认1800000即30分钟
      connection-timeout: 30000 #数据库连接超时时间,默认30秒，即30000
      connection-test-query: SELECT 1

# MyBatis 配置【如需使用记得打开】
mybatis:
  mapper-locations: classpath:/mybatis/mapper/*.xml
  config-location:  classpath:/mybatis/config/mybatis-config.xml

# 日志
logging:
  level:
    root: info
    com.echoamoy.holdlens.server.cases.agent.impl.FundSliceRefreshCaseImpl: debug
  config: classpath:logback-spring.xml

holdlens:
  agent:
    fund-catalog-refresh-url: http://127.0.0.1:8765/tasks/fund-catalog-refresh
    fund-purchase-status-refresh-url: http://127.0.0.1:8765/tasks/fund-purchase-status-refresh
    fund-period-return-refresh-url: http://127.0.0.1:8765/tasks/fund-period-return-refresh
    fund-top-holding-refresh-url: http://127.0.0.1:8765/tasks/fund-top-holding-refresh
    fund-asset-allocation-refresh-url: http://127.0.0.1:8765/tasks/fund-asset-allocation-refresh
    fund-top-holding-refresh:
      detail-stale-days: 15
    server-base-url: http://127.0.0.1:8091
    a-share-market-refresh-url: http://127.0.0.1:8765/tasks/a-share-market-refresh
    us-stock-market-refresh-url: http://127.0.0.1:8765/tasks/us-stock-market-refresh
    market-detail-data-refresh-url: http://127.0.0.1:8765/tasks/market-detail-data-refresh
    market-detail-data-refresh-callback-url: http://127.0.0.1:8091/internal/agent/market-detail-data-refresh/callback
    request-token: ""
    a-share-market-callback-url: http://127.0.0.1:8091/internal/agent/a-share-market-refresh/callback
    us-stock-market-callback-url: http://127.0.0.1:8091/internal/agent/us-stock-market-refresh/callback
    callback-header-value: internal
    fund-refresh-schedule-zone: Asia/Shanghai
    fund-catalog-refresh-schedule:
      enabled: false
      cron: "0 0 2 * * ?"
    fund-purchase-status-refresh-schedule:
      enabled: false
      cron: "0 10 2 * * ?"
    fund-period-return-refresh-schedule:
      enabled: false
      cron: "0 20 2 * * ?"
    fund-top-holding-refresh-schedule:
      enabled: false
      batch-size: 20
      cron: "0 30 2 1,15 * ?"
    fund-asset-allocation-refresh-schedule:
      enabled: false
      cron: "0 30 4 ? * MON"
      batch-size: 20
    fund-slice-callback-timeout:
      enabled: false
      minutes: 30
      cron: "0 */5 * * * ?"
